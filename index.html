<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Assignment-004</title>
  </head>
  <body class="bg-[#f8fafc]">
    <header class="w-[90%] md:w-[70%] mx-auto">
      <h1 class="text-3xl">Job Application Tracker</h1>
      <div class="grid grid-cols-3 gap-4">
        <div class="bg-white p-5 rounded-md">
          <p>Total</p>
          <p id="total" class="font-bold">0</p>
        </div>
        <div class="bg-white p-5 rounded-md">
          <p>Interview</p>
          <p id="interview-count" class="font-bold text-green-500">0</p>
        </div>
        <div class="bg-white p-5 rounded-md">
          <p>Rejected</p>
          <p id="rejected-count" class="font-bold text-red-500">0</p>
        </div>
      </div>
    </header>
    <hr class="my-5 w-[90%] md:w-[70%] mx-auto text-[#e6e7e9]" />
    <main class="w-[90%] md:w-[70%] mx-auto">
      <h2 class="mb-6 text-xl">Available Jobs</h2>
      <div class="flex gap-2">
        <button
          class="w-20 flex items-center justify-center h-8 px-3 py-2 rounded-md bg-blue-500"
          id="all-btn"
        >
          All
        </button>
        <button
          class="w-20 h-8 flex items-center justify-center px-3 py-2 bg-white rounded-md"
          id="interview-btn"
        >
          Interview
        </button>
        <button
          class="w-20 flex items-center justify-center h-8 px-3 py-2 bg-white rounded-md"
          id="rejected-btn"
        >
          Rejected
        </button>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
