<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Assignment-004</title>
  </head>
  <body class="bg-[#f8fafc]">
    <header class="w-[90%] md:w-[70%] mx-auto">
      <h1 class="text-3xl">Job Application Tracker</h1>
      <div class="grid grid-cols-3 gap-4">
        <div class="bg-white p-5 rounded-2xl">
          <p>Total</p>
          <p id="total" class="font-bold">0</p>
        </div>
        <div class="bg-white p-5 rounded-2xl">
          <p>Interview</p>
          <p id="interview-count" class="font-bold text-green-500">0</p>
        </div>
        <div class="bg-white p-5 rounded-2xl">
          <p>Rejected</p>
          <p id="rejected-count" class="font-bold text-red-500">0</p>
        </div>
      </div>
    </header>
    <hr class="my-5 w-[90%] md:w-[70%] mx-auto text-[#e6e7e9]" />
    <main class="w-[90%] md:w-[70%] mx-auto"></main>
    <script src="script.js"></script>
  </body>
</html>
